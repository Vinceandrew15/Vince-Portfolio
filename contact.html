<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Vince Gica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at 0% 100%, #0f172a 0%, #020617 100%);
            color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow-x: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, rgba(56, 189, 248, 0.07) 0%, rgba(168, 85, 247, 0.05) 100%);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
        }

        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: #38bdf8;
            outline: none;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
        }

        /* Loading state for button */
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="min-h-screen relative">
    <div class="blob bottom-0 left-0"></div>
    <div class="blob top-0 right-0" style="background: rgba(59, 130, 246, 0.06);"></div>

    <nav class="p-8 flex justify-between items-center max-w-7xl mx-auto relative z-10">
        <a href="index.html" class="text-3xl font-extrabold tracking-tighter hover:opacity-80 transition">VINCE<span class="text-sky-400">.</span></a>
        <div class="flex items-center space-x-10 text-sm font-semibold tracking-wide text-slate-400">
            <a href="index.html" class="hover:text-white transition-colors">HOME</a>
            <a href="projects.html" class="hover:text-white transition-colors">PROJECTS</a>
            <a href="#" class="text-white border-b-2 border-sky-500 pb-1">CONTACT</a>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-8 py-20 relative z-10">
        <div class="flex flex-col lg:flex-row gap-20">
            
            <div class="flex-1 space-y-12">
                <header class="space-y-6">
                    <h2 class="text-5xl md:text-7xl font-extrabold leading-tight">
                        Let's build <br> 
                        <span class="text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-blue-500">together.</span>
                    </h2>
                    <p class="text-slate-400 text-xl font-medium max-w-md leading-relaxed">
                        Currently open to Full-Stack Developer roles and specialized Technical Virtual Assistant opportunities.
                    </p>
                </header>

                <div class="space-y-10">
                    <div class="flex items-center gap-6 group">
                        <div class="w-14 h-14 glass rounded-2xl flex items-center justify-center text-sky-400 group-hover:border-sky-500/50 transition duration-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-500 uppercase font-black tracking-[0.2em] mb-1">Email</p>
                            <p class="font-bold text-slate-200 text-lg">gicavinceandrew@gmail.com</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-6 group">
                        <div class="w-14 h-14 glass rounded-2xl flex items-center justify-center text-emerald-400 group-hover:border-emerald-500/50 transition duration-500">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                            </svg>
                        </div>
                        <div>
                            <p class="text-[10px] text-slate-500 uppercase font-black tracking-[0.2em] mb-1">Location</p>
                            <p class="font-bold text-slate-200 text-lg">Bukidnon, Philippines</p>
                        </div>
                    </div>
                </div>

                <div class="pt-10 border-t border-white/5 flex gap-4">
                    <a href="https://www.upwork.com/freelancers/~0165b71b697f833446?mp_source=share" class="glass px-8 py-4 rounded-xl text-[10px] font-black hover:bg-white/5 transition uppercase tracking-[0.2em]">Upwork</a>
                    <a href="https://www.linkedin.com/in/vince-andrew-gica-9b5a362b4" class="glass px-8 py-4 rounded-xl text-[10px] font-black hover:bg-white/5 transition uppercase tracking-[0.2em]">LinkedIn</a>
                    <a href="https://github.com/Vinceandrew15" class="glass px-8 py-4 rounded-xl text-[10px] font-black hover:bg-white/5 transition uppercase tracking-[0.2em]">GitHub</a>
                </div>
            </div>

            <div class="flex-1">
                <div class="glass p-12 rounded-[3rem] relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-sky-500/5 blur-3xl rounded-full -mr-16 -mt-16"></div>
                    
                    <form id="contact-form" action="https://formspree.io/f/xlgokway" method="POST" class="space-y-8">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div class="space-y-3">
                                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-1">Full Name</label>
                                <input type="text" name="name" required placeholder="John Doe" class="input-field w-full px-6 py-5 rounded-2xl text-slate-200 font-medium">
                            </div>
                            <div class="space-y-3">
                                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-1">Email Address</label>
                                <input type="email" name="email" required placeholder="john@example.com" class="input-field w-full px-6 py-5 rounded-2xl text-slate-200 font-medium">
                            </div>
                        </div>
                        
                        <div class="space-y-3">
                            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-1">Project Interest</label>
                            <div class="relative">
                                <select name="interest" class="input-field w-full px-6 py-5 rounded-2xl text-slate-400 appearance-none font-medium">
                                    <option>Full-Stack Development</option>
                                    <option>Mobile App (Flutter)</option>
                                    <option>Multimedia / AI Design</option>
                                    <option>Technical VA Services</option>
                                </select>
                                <div class="absolute right-6 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z" clip-rule="evenodd" />
                                    </svg>
                                </div>
                            </div>
                        </div>

                        <div class="space-y-3">
                            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-500 ml-1">Message</label>
                            <textarea name="message" required rows="5" placeholder="Briefly describe your project or needs..." class="input-field w-full px-6 py-5 rounded-2xl text-slate-200 resize-none font-medium"></textarea>
                        </div>

                        <div class="space-y-4">
                            <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-sky-500 to-blue-600 text-white font-black py-6 rounded-2xl shadow-2xl shadow-sky-500/20 hover:scale-[1.02] active:scale-[0.98] transition duration-300 uppercase tracking-widest text-sm">
                                Send Message
                            </button>
                            <p id="form-status" class="text-center text-[10px] font-black uppercase tracking-[0.3em] transition-all duration-300"></p>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </main>

    <script>
        const form = document.getElementById("contact-form");
        const status = document.getElementById("form-status");
        const btn = document.getElementById("submit-btn");

        async function handleSubmit(event) {
            event.preventDefault();
            const data = new FormData(event.target);
            
            // Visual feedback - Sending
            btn.innerText = "Processing...";
            btn.disabled = true;
            status.innerText = "";

            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    // Success state
                    status.innerText = "Transmission Successful. Talk soon!";
                    status.style.color = "#10b981"; // Emerald
                    form.reset();
                    btn.innerText = "Message Sent";
                } else {
                    // Server error state
                    response.json().then(data => {
                        status.innerText = "Error: Check your details.";
                        status.style.color = "#f43f5e"; // Rose
                        btn.disabled = false;
                        btn.innerText = "Try Again";
                    })
                }
            }).catch(error => {
                // Network error state
                status.innerText = "Network Error. Please try later.";
                status.style.color = "#f43f5e";
                btn.disabled = false;
                btn.innerText = "Send Message";
            });
        }
        form.addEventListener("submit", handleSubmit);
    </script>
</body>
</html>
